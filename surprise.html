<button class="surprise-btn" onclick="goToBigSurprise()">
🎁 Click For Biggest Surprise
</button>

<script>
function showSurprise(){
  window.location.href = "surprise.html";
}

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function fireConfetti() {

  confetti({
    particleCount: 200,
    spread: 120,
    startVelocity: 50,
    origin: { y: 0.6 }
  });

}

/* run when page loads */
window.onload = fireConfetti;

function goToBigSurprise(){
  window.location.href = "bigsurprise.html";
}
</script>
<script>

/* ADD THIS PART */

function openImage(img){
  document.getElementById("imageViewer").style.display="flex";
  document.getElementById("fullImage").src=img.src;
}

function closeImage(){
  document.getElementById("imageViewer").style.display="none";
}

</script>
</body>
<div id="imageViewer" class="viewer" onclick="closeImage()">
  <img id="fullImage">
</div>
