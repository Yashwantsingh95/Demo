<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<link rel="stylesheet" href="gallery.css">
</head>

<body>

<h1>🎉 Birthday Memories 🎉</h1>
<p>Some special moments ✨</p>

<div class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpeg">
  <img src="img3.jpeg">
  <img src="img4.jpg">
  <img src="img5.jpg">
  <img src="img6.jpeg">
</div>

<br><br>

<button class="surprise-btn" onclick="goToBigSurprise()">
🎁 Click For Biggest Surprise
</button>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function fireConfetti(){
  confetti({
    particleCount:200,
    spread:120,
    startVelocity:50,
    origin:{ y:0.6 }
  });
}

window.onload = function(){

  fireConfetti();

  setTimeout(fireConfetti,500);
  setTimeout(fireConfetti,1000);
  setTimeout(fireConfetti,1500);

}
function goToBigSurprise(){
  window.location.href = "bigsurprise.html";
}
</script>

</body>
</html>
